<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batalhão CHOQUE 1BTL — Painel de Metas</title>
  <link rel="icon" href="assets/emblema-choque-1btl.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="bullet-hole bullet-hole-a"></div>
    <div class="bullet-hole bullet-hole-b"></div>
    <div class="bullet-hole bullet-hole-d"></div>
    <div class="bullet-hole bullet-hole-e"></div>
    <div class="tracer tracer-1"></div>
    <div class="tracer tracer-2"></div>
    <div class="tracer tracer-3"></div>
    <div class="muzzle-spark muzzle-spark-1"></div>
    <div class="muzzle-spark muzzle-spark-2"></div>
    <div class="emblema-wrap">
      <img src="assets/emblema-choque-1btl.png" alt="Emblema Choque 1BTL" class="emblema">
    </div>
    <h1 id="batalhao-nome">BATALHÃO CHOQUE 1BTL</h1>
    <p id="batalhao-subtitulo">Painel de Metas Individuais</p>
    <div class="efetivo-tag">Efetivo: <span id="efetivo-nome"></span></div>
    <div class="status-tag"><span class="status-dot"></span>Sistema Online</div>
  </header>

  <div class="hero-banner">
    <div class="hero-banner-frame">
      <span class="corner corner-tl"></span>
      <span class="corner corner-tr"></span>
      <span class="corner corner-bl"></span>
      <span class="corner corner-br"></span>
      <div class="bullet-hole bullet-hole-g"></div>
      <img src="assets/banner-metas-1btl.png" alt="Metas 1BTL Choque" class="hero-banner-img">
    </div>
  </div>

  <div class="container">

    <div class="resumo">
      <div class="resumo-topo">
        <span class="resumo-titulo">Progresso Geral</span>
        <span id="resumo-pct">0%</span>
      </div>
      <div class="barra-fundo-lg">
        <div id="resumo-barra" style="width: 0%"></div>
      </div>
    </div>

    <h2 class="secao-titulo">Metas</h2>
    <div id="metas-container"></div>

    <h2 class="secao-titulo">Registros / Prints</h2>
    <div id="filtros-container"></div>
    <div id="prints-container"></div>
    <div id="prints-vazio">Nenhum print adicionado ainda nesta categoria.</div>

  </div>

  <footer>
    <div class="bullet-hole bullet-hole-c"></div>
    <div class="bullet-hole bullet-hole-f"></div>
    Atualizado manualmente pelo efetivo. Uso interno do batalhão.
  </footer>

  <div id="lightbox">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
